# Aunion AI Backend Docker Compose
# CPU 버전

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
    environment:
      - USE_GPU=false
    restart: unless-stopped
