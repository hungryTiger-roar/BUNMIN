# Aunion AI - Frontend + Backend (CPU)
# 실행: docker compose up

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/models:/app/models
      - hf_cache:/root/.cache/huggingface
      - pip_cache:/root/.cache/pip
    environment:
      - ASR_MODEL=${ASR_MODEL:-ghost613/faster-whisper-large-v3-turbo-korean}
      - NMT_MODEL=${NMT_MODEL:-Helsinki-NLP/opus-mt-ko-en}
      - TTS_MODEL=${TTS_MODEL:-onnx-community/Supertonic-TTS-2-ONNX}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
      - NMT_DEVICE=${NMT_DEVICE:-cpu}
      - TTS_DEVICE=${TTS_DEVICE:-cpu}
      - OCR_DEVICE=${OCR_DEVICE:-cpu}
      - HF_TOKEN=${HF_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  eval:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./evaluation:/app/evaluation
      - ./backend/cache:/root/.cache/huggingface
      - pip_cache:/root/.cache/pip
    environment:
      - ASR_MODEL=${ASR_MODEL:-ghost613/faster-whisper-large-v3-turbo-korean}
      - NMT_MODEL=${NMT_MODEL:-Helsinki-NLP/opus-mt-ko-en}
      - TTS_MODEL=${TTS_MODEL:-onnx-community/Supertonic-TTS-2-ONNX}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
      - NMT_DEVICE=${NMT_DEVICE:-cpu}
      - TTS_DEVICE=${TTS_DEVICE:-cpu}
      - OCR_DEVICE=${OCR_DEVICE:-cpu}
      - HF_TOKEN=${HF_TOKEN}
    stdin_open: true
    tty: true
    profiles:
      - eval
    command: python evaluation/run_eval.py

volumes:
  hf_cache:
  pip_cache:
